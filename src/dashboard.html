<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embedded Focus Monitor</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top right, #103b2e, #070b14 60%);
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 30px;
    }

    button {
      background: transparent;
      color: white;
      border: 1px solid white;
      border-radius: 20px;
      padding: 10px 18px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 25px;
      margin-top: 25px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.35);
    }

    .state {
      font-size: 64px;
      font-weight: bold;
      margin: 20px 0;
    }

    .focused {
      color: #22c55e;
    }

    .distracted {
      color: #f59e0b;
    }

    .finger {
      color: #ef4444;
      font-size: 42px;
    }

    .confidence-bar {
      width: 100%;
      height: 12px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin: 12px 0 25px;
    }

    .confidence-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      transition: width 0.3s ease;
    }

    .readings {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .reading {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 16px;
    }

    .reading label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .reading span {
      font-size: 26px;
      font-weight: bold;
    }

    pre {
      background: rgba(0, 0, 0, 0.35);
      padding: 18px;
      border-radius: 14px;
      overflow-x: auto;
      color: #ddd;
    }

    .status {
      display: inline-block;
      margin-top: 10px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Embedded Focus Monitor</h1>
    <div class="subtitle">Arduino Nano 33 BLE Sense Rev2 + Pulse Sensor + IMU + Edge Impulse</div>

    <button onclick="connectBLE()">Connect Nano</button>
    <span class="status" id="status">Not connected</span>

    <div class="grid">
      <div class="card">
        <h3>Current Classification</h3>
        <div id="state" class="state">WAITING</div>

        <div>Confidence</div>
        <div class="confidence-bar">
          <div id="confidenceFill" class="confidence-fill"></div>
        </div>

        <pre id="rawJson">{ waiting for sensor data }</pre>
      </div>

      <div class="card">
        <h3>Live Sensor Readings</h3>

        <div class="readings">
          <div class="reading">
            <label>Pulse Activity</label>
            <span id="bpm">0</span>
          </div>

          <div class="reading">
            <label>Pulse Variation</label>
            <span id="pulseVar">0</span>
          </div>

          <div class="reading">
            <label>Pulse Average</label>
            <span id="pulseAvg">0</span>
          </div>

          <div class="reading">
            <label>Motion Average</label>
            <span id="motionAvg">0</span>
          </div>

          <div class="reading">
            <label>Motion Max</label>
            <span id="motionMax">0</span>
          </div>

          <div class="reading">
            <label>Model Runs</label>
            <span id="runs">0</span>
          </div>

          <div class="reading">
            <label>Focused Score</label>
            <span id="focusedScore">0%</span>
          </div>

          <div class="reading">
            <label>Distracted Score</label>
            <span id="distractedScore">0%</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
    const CHARACTERISTIC_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

    async function connectBLE() {
      try {
        document.getElementById("status").textContent = "Connecting...";

        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: "FocusMonitor" }],
          optionalServices: [SERVICE_UUID]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        await characteristic.startNotifications();

        characteristic.addEventListener("characteristicvaluechanged", event => {
          const value = new TextDecoder().decode(event.target.value);
          updateDashboard(value);
        });

        document.getElementById("status").textContent = "Connected to FocusMonitor";
      } catch (error) {
        document.getElementById("status").textContent = "Connection failed";
        console.error(error);
      }
    }

    function updateDashboard(jsonString) {
      try {
        const data = JSON.parse(jsonString);

        const stateEl = document.getElementById("state");
        const state = data.state || "UNKNOWN";

        stateEl.textContent = state;
        stateEl.className = "state";

        if (state === "FOCUSED") {
          stateEl.classList.add("focused");
        } else if (state === "DISTRACTED") {
          stateEl.classList.add("distracted");
        } else {
          stateEl.classList.add("finger");
        }

        const confidence = Math.round((data.c || 0) * 100);
        document.getElementById("confidenceFill").style.width = confidence + "%";

        document.getElementById("bpm").textContent = data.b ?? 0;
        document.getElementById("pulseVar").textContent = data.pv ?? 0;
        document.getElementById("pulseAvg").textContent = data.pa ?? 0;
        document.getElementById("motionAvg").textContent = data.ma ?? 0;
        document.getElementById("motionMax").textContent = data.mx ?? 0;
        document.getElementById("runs").textContent = data.r ?? 0;

        document.getElementById("focusedScore").textContent =
          Math.round((data.fs || 0) * 100) + "%";

        document.getElementById("distractedScore").textContent =
          Math.round((data.ds || 0) * 100) + "%";

        document.getElementById("rawJson").textContent =
          JSON.stringify(data, null, 2);

      } catch (error) {
        console.error("Invalid JSON:", jsonString);
      }
    }
  </script>
</body>
</html>
